version: 2

project_name: bai

builds:
  - id: bai
    main: ./cmd/bai
    binary: bai
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/bluefunda/bluefunda-ai/internal/cmd.Version={{ .Version }}
    flags:
      - -trimpath

archives:
  - id: bai
    name_template: "bai_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
      - zip
    format_overrides:
      - goos: darwin
        formats:
          - zip
      - goos: linux
        formats:
          - tar.gz
    files:
      - none*

nfpms:
  - id: bai
    package_name: bai
    ids:
      - bai
    vendor: BlueFunda
    maintainer: BlueFunda <support@bluefunda.com>
    description: Cross-platform CLI for BlueFunda AI — context-aware AI agents for SAP operations.
    license: Apache-2.0
    formats:
      - deb
      - rpm
    bindir: /opt/bai/bin
    contents:
      - dst: /opt/bai/etc
        type: dir
      - dst: /opt/bai/log
        type: dir
      - dst: /usr/local/bin/bai
        src: /opt/bai/bin/bai
        type: symlink

notarize:
  macos:
    - enabled: true
      sign:
        certificate: "{{ .Env.MACOS_CERTIFICATE }}"
        password: "{{ .Env.MACOS_CERTIFICATE_PWD }}"
      notarize:
        issuer_id: "{{ .Env.NOTARIZATION_ISSUER_ID }}"
        key_id: "{{ .Env.NOTARIZATION_KEY_ID }}"
        key: "{{ .Env.NOTARIZATION_KEY }}"

homebrew_casks:
  - name: bai
    ids:
      - bai
    binaries:
      - bai
    homepage: https://github.com/bluefunda/bluefunda-ai
    description: CLI for BlueFunda AI — context-aware AI agents for SAP operations
    directory: Casks
    repository:
      owner: bluefunda
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: bluefunda
    name: bluefunda-ai
  draft: false
  replace_existing_draft: true
  name_template: "bai v{{ .Version }}"
  header: |
    ## BlueFunda AI CLI (bai) v{{ .Version }}

    Cross-platform CLI for BlueFunda AI — context-aware AI agents for SAP operations.

    ### Installation

    **Homebrew (macOS):**
    ```bash
    brew tap bluefunda/tap
    brew install --cask bai
    ```

    **One-line installer (macOS and Linux):**
    ```bash
    curl -fsSL https://raw.githubusercontent.com/bluefunda/bluefunda-ai/main/install.sh | sh
    ```

    **Debian/Ubuntu (x86_64):**
    ```bash
    curl -sL https://github.com/bluefunda/bluefunda-ai/releases/download/v{{ .Version }}/bai_{{ .Version }}_linux_amd64.deb -o bai.deb
    sudo dpkg -i bai.deb
    ```

    **Debian/Ubuntu (ARM64):**
    ```bash
    curl -sL https://github.com/bluefunda/bluefunda-ai/releases/download/v{{ .Version }}/bai_{{ .Version }}_linux_arm64.deb -o bai.deb
    sudo dpkg -i bai.deb
    ```

    **RHEL / Fedora / Rocky (x86_64):**
    ```bash
    sudo rpm -i https://github.com/bluefunda/bluefunda-ai/releases/download/v{{ .Version }}/bai_{{ .Version }}_linux_amd64.rpm
    ```

    **RHEL / Fedora / Rocky (ARM64):**
    ```bash
    sudo rpm -i https://github.com/bluefunda/bluefunda-ai/releases/download/v{{ .Version }}/bai_{{ .Version }}_linux_arm64.rpm
    ```

    **macOS (manual):**
    ```bash
    curl -sL https://github.com/bluefunda/bluefunda-ai/releases/download/v{{ .Version }}/bai_{{ .Version }}_darwin_arm64.zip -o bai.zip
    unzip bai.zip && chmod +x bai && sudo mv bai /usr/local/bin/
    ```

    **Linux (manual):**
    ```bash
    curl -sL https://github.com/bluefunda/bluefunda-ai/releases/download/v{{ .Version }}/bai_{{ .Version }}_linux_amd64.tar.gz | tar xz
    chmod +x bai && sudo mv bai /usr/local/bin/
    ```

snapshot:
  version_template: "{{ incpatch .Version }}-next"
